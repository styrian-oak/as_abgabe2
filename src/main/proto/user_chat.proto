syntax = "proto3";

package chat;

option java_multiple_files = true;
option java_package = "berlin.tu.eecs.chat";
option java_outer_classname = "UserChatProto";

import "common.proto"; // Gemeinsamen Datentypen importieren

// Schnittstelle für normale Chat-Benutzer; welche gRPC-Methoden kann ein User-Client aufrufen?

// Der UserChatService hat 2 Methoden
// Ein service beschreibt, welche Funktionen der Server anbietet
service UserChatService {
  rpc SendMessage (SendMessageRequest) returns (ChatMessage);
  rpc ListMessages (Empty) returns (MessageList);
}

// Client sendet nur Autor & Text; Server ergänzt danach ID & Zeitstempel (Datentyp ChatMessage)
// Dh nach dem Senden erfährt der Client, welche ID die neue Nachricht bekommen hat
message SendMessageRequest {
  string author = 1;
  string text = 2;
}
